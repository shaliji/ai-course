<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>科大讯飞岗位选择卡</title>
<style>
  :root {
    --bg: #f4f1ea;
    --panel: #fffaf0;
    --card: #fffdf8;
    --ink: #1f2933;
    --muted: #687076;
    --line: #ded6c6;
    --accent: #0f766e;
    --accent-soft: #d6f3ef;
    --salary: #d6452f;

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    color: var(--ink);
    font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
    background:

  }
  .page {
    width: min(1480px, calc(100% - 40px));
    margin: 0 auto;
    padding: 30px 0 64px;
  }
  header {
    padding: 34px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: var(--shadow);
  }
  .eyebrow {
    margin: 0 0 12px;
    color: var(--accent);
    font-size: 13px;
    font-weight: 900;
    letter-spacing: .12em;
  }
  h1 {
    margin: 0;
    font-size: clamp(34px, 5vw, 62px);
    line-height: 1.05;
    letter-spacing: 0;
  }
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin: 18px 0 22px;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255,250,240,.94);
    backdrop-filter: blur(12px);
  }
  .search {
    flex: 1 1 260px;
    min-width: 0;
    height: 42px;
    padding: 0 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-weight: 700;
  }
  .filter {
    min-width: 128px;
    height: 42px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
    font: inherit;
    font-weight: 800;
  }
  .jobs {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 18px;
  }
  .job-card {
    display: flex;
    flex-direction: column;
    min-height: 520px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
    box-shadow: 0 12px 28px rgba(59, 48, 34, .08);
  }
  .card-top {
    padding: 20px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #fff 0%, #fff7e8 100%);
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .index {
    padding: 5px 9px;
    border-radius: 999px;
    background: var(--dark);
    color: #fff;
    font-size: 12px;
    font-weight: 900;
  }
  .salary {
    color: var(--salary);
    font-size: 24px;
    font-weight: 1000;
    white-space: nowrap;
  }
  h2 {
    margin: 14px 0 12px;
    font-size: 23px;
    line-height: 1.25;
    letter-spacing: 0;
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }
  .meta span {
    padding: 5px 9px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: #105a54;
    font-size: 12px;
    font-weight: 900;
  }
  .summary {
    margin: 0;
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.7;
    font-weight: 650;
  }
  .content {
    display: grid;
    gap: 14px;
    padding: 16px;
  }
  .block {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #fff;
  }
  h3 {
    margin: 0 0 10px;
    font-size: 16px;
  }
  ul {
    margin: 0;
    padding-left: 18px;
    color: #424b54;
    font-size: 14px;
    line-height: 1.75;
  }
  li { margin: 5px 0; }
  .copy-btn {
    margin-top: auto;
    border: 0;
    border-top: 1px solid var(--line);
    padding: 14px 16px;
    cursor: pointer;
    background: var(--dark);
    color: #fff;
    font-weight: 900;
    font-size: 14px;
  }
  .copy-btn:hover { background: #0f766e; }
  .empty {
    display: none;
    padding: 28px;
    border: 1px dashed var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--muted);
    font-weight: 800;
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    opacity: 0;
    pointer-events: none;
    padding: 12px 18px;
    border-radius: 999px;
    background: var(--dark);
    color: white;
    font-weight: 900;
    box-shadow: 0 12px 30px rgba(0,0,0,.2);
    transition: all .22s ease;
    z-index: 20;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (max-width: 900px) {
    .page { width: min(100% - 24px, 1480px); padding-top: 16px; }
    header { padding: 24px; }
    .jobs { grid-template-columns: 1fr; }
    .toolbar { position: static; }
    .salary { font-size: 21px; }
  }
</style>
</head>

  const jobsEl = document.getElementById('jobs');
  const emptyEl = document.getElementById('empty');
  const searchEl = document.getElementById('search');
  const categoryEl = document.getElementById('categoryFilter');
  const salaryEl = document.getElementById('salaryFilter');
  const toast = document.getElementById('toast');

  const categories = ['全部方向', ...new Set(jobs.map(job => job.category))];
  categoryEl.innerHTML = categories.map((name, index) => `<option value="${index ? name : ''}">${name}</option>`).join('');

  function maxSalary(job) {
    const numbers = job.salary.match(/\d+/g) || [];
    return Math.max(...numbers.map(Number));
  }

  function matchSalary(job, filter) {
    const max = maxSalary(job);
    if (filter === 'lt20') return max < 20;
    if (filter === '20to35') return max >= 20 && max <= 35;
    if (filter === '35plus') return max > 35;
    return true;
  }

  function copyText(job) {
    return [
      job.title,
      `薪资：${job.salary}`,
      `城市：${job.city}｜经验：${job.experience}｜学历：${job.education}`,
      '',
      '岗位职责',
      ...job.duties.map((item, index) => `${index + 1}. ${item}`),
      '',
      '岗位要求',
      ...job.requirements.map((item, index) => `${index + 1}. ${item}`)
    ].join('\n');
  }

  function render() {
    const keyword = searchEl.value.trim().toLowerCase();
    const category = categoryEl.value;
    const salary = salaryEl.value;
    const filtered = jobs.filter(job => {
      const haystack = [job.category, job.title, job.salary, job.city, job.experience, job.education, job.summary, ...job.duties, ...job.requirements].join(' ').toLowerCase();
      return (!keyword || haystack.includes(keyword)) &&
        (!category || job.category === category) &&
        matchSalary(job, salary);
    });

    jobsEl.innerHTML = filtered.map((job, index) => `
      <article class="job-card">
        <div class="card-top">
          <div class="top-row">
            <span class="index">#${String(index + 1).padStart(2, '0')}</span>
            <span class="salary">${job.salary}</span>
          </div>
          <h2>${job.title}</h2>
          <div class="meta">
            <span>${job.category}</span>
            <span>${job.city}</span>
            <span>${job.experience}</span>
            <span>${job.education}</span>
          </div>
          <p class="summary">${job.summary}</p>
        </div>
        <div class="content">
          <section class="block">
            <h3>岗位职责</h3>
            <ul>${job.duties.map(item => `<li>${item}</li>`).join('')}</ul>
          </section>
          <section class="block">
            <h3>岗位要求</h3>
            <ul>${job.requirements.map(item => `<li>${item}</li>`).join('')}</ul>
          </section>
        </div>
        <button class="copy-btn" data-index="${jobs.indexOf(job)}">复制岗位信息</button>
      </article>
    `).join('');
    emptyEl.style.display = filtered.length ? 'none' : 'block';
  }

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1400);
  }

  jobsEl.addEventListener('click', async event => {
    const button = event.target.closest('.copy-btn');
    if (!button) return;
    const job = jobs[Number(button.dataset.index)];
    try {
      await navigator.clipboard.writeText(copyText(job));
    } catch (error) {
      const area = document.createElement('textarea');
      area.value = copyText(job);
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      document.body.removeChild(area);
    }
    const old = button.textContent;
    button.textContent = '已复制';
    showToast(`已复制：${job.title}`);
    setTimeout(() => button.textContent = old, 1200);
  });

  [searchEl, categoryEl, salaryEl].forEach(input => input.addEventListener('input', render));
  render();
</script>
