<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避障碍物小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        .main-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        /* ========== 开始菜单页面 ========== */
        .start-menu {
            text-align: center;
            padding: 34px 64px;
            background: linear-gradient(135deg, rgba(26, 26, 62, 0.9), rgba(22, 33, 62, 0.9));
            border-radius: 30px;
            border: 3px solid rgba(74, 158, 255, 0.3);
            box-shadow: 0 0 50px rgba(74, 158, 255, 0.2);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .game-logo {
            font-size: 56px;
            margin-bottom: 8px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .start-menu h1 {
            color: #fff;
            font-size: 36px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.5);
        }
        
        .start-menu .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 17px;
            margin-bottom: 24px;
        }
        
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }
        
        .menu-btn {
            width: 280px;
            padding: 14px 36px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .menu-btn:hover {
            transform: scale(1.05);
        }
        
        .btn-start {
            background: linear-gradient(135deg, #00d26a 0%, #00b894 100%);
            color: #fff;
            box-shadow: 0 5px 20px rgba(0, 210, 106, 0.4);
        }
        
        .btn-start:hover {
            box-shadow: 0 8px 30px rgba(0, 210, 106, 0.6);
        }
        
        .btn-leaderboard {
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            color: #1a1a2e;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        .btn-leaderboard:hover {
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.6);
        }
        
        .game-rules {
            margin-top: 24px;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            text-align: left;
        }
        
        .game-rules h3 {
            color: #4a9eff;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .game-rules ul {
            color: rgba(255, 255, 255, 0.7);
            list-style: none;
            line-height: 1.65;
        }
        
        .game-rules li::before {
            content: "▸ ";
            color: #4a9eff;
            font-weight: bold;
        }
        
        /* ========== 游戏页面 ========== */
        .game-container {
            text-align: center;
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 14px 0;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(800px, calc((100vh - 128px) * 4 / 3));
            margin-bottom: 8px;
            padding: 0 10px;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .game-title-small {
            color: #fff;
            font-size: 20px;
        }
        
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 8px;
            color: #fff;
            font-size: 18px;
        }
        
        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        #gameCanvas {
            width: min(800px, calc((100vh - 128px) * 4 / 3));
            height: auto;
            border: 3px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
            cursor: grab;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 100%);
        }
        
        #gameCanvas:active {
            cursor: grabbing;
        }
        
        .instructions {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            font-size: 14px;
        }
        
        /* ========== 排行榜页面 ========== */
        .leaderboard-page {
            display: none;
            background: linear-gradient(135deg, rgba(26, 26, 62, 0.95), rgba(22, 33, 62, 0.95));
            border-radius: 20px;
            border: 3px solid rgba(74, 158, 255, 0.3);
            padding: 30px 40px;
            width: 500px;
            animation: fadeIn 0.3s ease-out;
        }
        
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .leaderboard-header h2 {
            color: #ffd700;
            font-size: 32px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .leaderboard-list-full {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .leaderboard-list-full::-webkit-scrollbar {
            width: 8px;
        }
        
        .leaderboard-list-full::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .leaderboard-list-full::-webkit-scrollbar-thumb {
            background: rgba(74, 158, 255, 0.5);
            border-radius: 4px;
        }
        
        .leaderboard-item-full {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            transition: all 0.2s;
        }
        
        .leaderboard-item-full:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }
        
        .leaderboard-item-full.top3 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .rank-large {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 18px;
        }
        
        .rank-large.gold {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            font-size: 24px;
        }
        
        .rank-large.silver {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #1a1a2e;
            font-size: 24px;
        }
        
        .rank-large.bronze {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: #fff;
            font-size: 24px;
        }
        
        .rank-large.normal {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .player-info-full {
            flex: 1;
            text-align: left;
        }
        
        .player-name-full {
            color: #fff;
            font-weight: bold;
            font-size: 18px;
        }
        
        .player-stats-full {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 4px;
        }
        
        .player-score-full {
            color: #4a9eff;
            font-weight: bold;
            font-size: 24px;
        }
        
        .empty-leaderboard-full {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            padding: 80px 20px;
            font-size: 18px;
        }
        
        .leaderboard-actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        
        .leaderboard-actions .menu-btn {
            width: auto;
            flex: 1;
            padding: 15px 30px;
            font-size: 16px;
        }
        
        .btn-clear {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: #fff;
        }
        
        .btn-back {
            background: linear-gradient(135deg, #4a9eff 0%, #6c5ce7 100%);
            color: #fff;
        }
        
        /* ========== 游戏结束弹窗 ========== */
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .game-over-content {
            text-align: center;
            color: #fff;
            animation: popIn 0.3s ease-out;
            background: linear-gradient(135deg, #1a1a3e, #16213e);
            padding: 40px 60px;
            border-radius: 20px;
            border: 2px solid rgba(74, 158, 255, 0.3);
        }
        
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .game-over-content h2 {
            font-size: 48px;
            color: #ff4757;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        
        .game-over-content p {
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .name-input-section {
            margin: 25px 0;
        }
        
        .name-input-section input {
            padding: 12px 20px;
            font-size: 18px;
            border: 2px solid rgba(74, 158, 255, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-align: center;
            width: 200px;
            outline: none;
        }
        
        .name-input-section input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .name-input-section input:focus {
            border-color: #4a9eff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.3);
        }
        
        .save-btn {
            background: linear-gradient(135deg, #00d26a 0%, #00b894 100%);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
        }
        
        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 210, 106, 0.5);
        }
        
        .save-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #4a9eff 0%, #6c5ce7 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }
        
        .new-record {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 10px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- ========== 开始菜单 ========== -->
        <div class="start-menu" id="startMenu">
            <div class="game-logo">🎮</div>
            <h1>躲避障碍物</h1>
            <p class="subtitle">考验你的反应速度和操作技巧</p>
            
            <div class="menu-buttons">
                <button class="menu-btn btn-start" onclick="startGame()">
                    ▶️ 开始游戏
                </button>
                <button class="menu-btn btn-leaderboard" onclick="showLeaderboardPage()">
                    🏆 查看排行榜
                </button>
            </div>
            
            <div class="game-rules">
                <h3>📋 游戏规则</h3>
                <ul>
                    <li>鼠标移动 或 键盘方向键/WASD控制小人</li>
                    <li>躲避从四面八方飞来的障碍物</li>
                    <li>存活时间越长，难度越高</li>
                    <li>被碰到游戏结束，可保存成绩</li>
                </ul>
            </div>
        </div>
        
        <!-- ========== 游戏页面 ========== -->
        <div class="game-container" id="gameContainer">
            <div class="game-header">
                <button class="back-btn" onclick="backToMenu()">← 返回菜单</button>
                <span class="game-title-small">🎮 躲避障碍物</span>
                <div style="width: 100px;"></div>
            </div>
            <div class="info-bar">
                <div class="info-item">⏱️ 存活时间: <span id="surviveTime">0</span> 秒</div>
                <div class="info-item">🎯 难度等级: <span id="difficulty">1</span></div>
            </div>
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <p class="instructions">💡 鼠标移动 或 ↑↓←→ / WASD 键控制小人躲避障碍物，坚持越久越厉害！</p>
        </div>
        
        <!-- ========== 排行榜页面 ========== -->
        <div class="leaderboard-page" id="leaderboardPage">
            <div class="leaderboard-header">
                <h2>🏆 排行榜</h2>
                <button class="back-btn" onclick="backToMenu()">← 返回菜单</button>
            </div>
            <div class="leaderboard-list-full" id="leaderboardListFull">
                <div class="empty-leaderboard-full">暂无记录<br>快来挑战吧！</div>
            </div>
            <div class="leaderboard-actions">
                <button class="menu-btn btn-clear" onclick="clearLeaderboard()">🗑️ 清空记录</button>
                <button class="menu-btn btn-back" onclick="backToMenu()">📋 返回菜单</button>
            </div>
        </div>
    </div>
    
    <!-- ========== 游戏结束弹窗 ========== -->
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>💥 游戏结束!</h2>
            <div id="newRecordMsg" class="new-record" style="display: none;">🎉 新纪录！</div>
            <p>你存活了 <span id="finalTime">0</span> 秒</p>
            <p>最高难度等级: <span id="finalDifficulty">1</span></p>
            
            <div class="name-input-section">
                <input type="text" id="playerName" placeholder="输入你的名字" maxlength="10">
                <button class="save-btn" onclick="saveScore()">💾 保存</button>
            </div>
            
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="restart-btn" onclick="restartGame()">🔄 再来一局</button>
                <button class="restart-btn" onclick="backToMenuFromGame()" style="background: linear-gradient(135deg, #666, #888);">📋 返回菜单</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 页面元素
        const startMenu = document.getElementById('startMenu');
        const gameContainer = document.getElementById('gameContainer');
        const leaderboardPage = document.getElementById('leaderboardPage');
        
        // 游戏状态
        let gameRunning = false;
        let startTime = Date.now();
        let surviveTime = 0;
        let difficulty = 1;
        let lastDifficultyUp = 0;
        let isNewRecord = false;
        let gameInitialized = false;
        
        // 玩家
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 25,
            color: '#4a9eff',
            speed: 8  // 键盘移动速度
        };
        
        // 键盘按键状态
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false,
            w: false,
            s: false,
            a: false,
            d: false
        };
        
        // 障碍物数组
        let obstacles = [];
        
        // 排行榜数据
        let leaderboard = [];
        
        // ========== 页面切换功能 ==========
        
        // 显示开始菜单
        function showStartMenu() {
            startMenu.style.display = 'block';
            gameContainer.style.display = 'none';
            leaderboardPage.style.display = 'none';
        }
        
        // 开始游戏
        function startGame() {
            startMenu.style.display = 'none';
            gameContainer.style.display = 'flex';
            leaderboardPage.style.display = 'none';
            
            if (!gameInitialized) {
                gameInitialized = true;
                resetGame();
                gameLoop();
            } else {
                restartGame();
            }
        }
        
        // 显示排行榜页面
        function showLeaderboardPage() {
            startMenu.style.display = 'none';
            gameContainer.style.display = 'none';
            leaderboardPage.style.display = 'block';
            renderLeaderboardFull();
        }
        
        // 返回菜单
        function backToMenu() {
            gameRunning = false;
            showStartMenu();
        }
        
        // 从游戏返回菜单
        function backToMenuFromGame() {
            document.getElementById('gameOverOverlay').style.display = 'none';
            backToMenu();
        }
        
        // ========== 排行榜功能 ==========
        
        // 从本地存储加载排行榜
        function loadLeaderboard() {
            const saved = localStorage.getItem('dodgeGameLeaderboard');
            if (saved) {
                leaderboard = JSON.parse(saved);
            }
        }
        
        // 保存排行榜到本地存储
        function saveLeaderboard() {
            localStorage.setItem('dodgeGameLeaderboard', JSON.stringify(leaderboard));
        }
        
        // 渲染完整排行榜
        function renderLeaderboardFull() {
            const listEl = document.getElementById('leaderboardListFull');
            
            if (leaderboard.length === 0) {
                listEl.innerHTML = '<div class="empty-leaderboard-full">暂无记录<br>快来挑战吧！</div>';
                return;
            }
            
            // 按分数排序
            leaderboard.sort((a, b) => b.score - a.score);
            
            let html = '';
            leaderboard.forEach((entry, index) => {
                const rank = index + 1;
                let rankClass = 'normal';
                let rankIcon = rank;
                
                if (rank === 1) {
                    rankClass = 'gold';
                    rankIcon = '🥇';
                } else if (rank === 2) {
                    rankClass = 'silver';
                    rankIcon = '🥈';
                } else if (rank === 3) {
                    rankClass = 'bronze';
                    rankIcon = '🥉';
                }
                
                const isTop3 = rank <= 3 ? 'top3' : '';
                const date = new Date(entry.date).toLocaleDateString('zh-CN');
                const time = new Date(entry.date).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                
                html += `
                    <div class="leaderboard-item-full ${isTop3}">
                        <div class="rank-large ${rankClass}">${rankIcon}</div>
                        <div class="player-info-full">
                            <div class="player-name-full">${escapeHtml(entry.name)}</div>
                            <div class="player-stats-full">难度${entry.difficulty} · ${date} ${time}</div>
                        </div>
                        <div class="player-score-full">${entry.score}秒</div>
                    </div>
                `;
            });
            
            listEl.innerHTML = html;
        }
        
        // HTML转义防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 检查是否为新纪录
        function checkNewRecord(score) {
            if (leaderboard.length === 0) return true;
            return score > leaderboard[leaderboard.length - 1].score || leaderboard.length < 10;
        }
        
        // 保存成绩
        function saveScore() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim() || '匿名玩家';
            
            const newEntry = {
                name: name,
                score: surviveTime,
                difficulty: difficulty,
                date: new Date().toISOString()
            };
            
            leaderboard.push(newEntry);
            
            // 只保留前10名
            leaderboard.sort((a, b) => b.score - a.score);
            if (leaderboard.length > 10) {
                leaderboard = leaderboard.slice(0, 10);
            }
            
            saveLeaderboard();
            
            // 禁用保存按钮
            const saveBtn = document.querySelector('.save-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = '✅ 已保存';
        }
        
        // 清空排行榜
        function clearLeaderboard() {
            if (confirm('确定要清空所有排行榜记录吗？')) {
                leaderboard = [];
                saveLeaderboard();
                renderLeaderboardFull();
            }
        }
        
        // ========== 游戏功能 ==========
        
        // 障碍物类
        class Obstacle {
            constructor() {
                this.radius = 15 + Math.random() * 20;
                this.speed = 2 + Math.random() * 3 + difficulty * 0.5;
                
                // 从四个方向随机生成
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: // 上
                        this.x = Math.random() * canvas.width;
                        this.y = -this.radius;
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = this.speed;
                        break;
                    case 1: // 下
                        this.x = Math.random() * canvas.width;
                        this.y = canvas.height + this.radius;
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = -this.speed;
                        break;
                    case 2: // 左
                        this.x = -this.radius;
                        this.y = Math.random() * canvas.height;
                        this.vx = this.speed;
                        this.vy = (Math.random() - 0.5) * 4;
                        break;
                    case 3: // 右
                        this.x = canvas.width + this.radius;
                        this.y = Math.random() * canvas.height;
                        this.vx = -this.speed;
                        this.vy = (Math.random() - 0.5) * 4;
                        break;
                }
                
                const colors = ['#ff4757', '#ff6b81', '#ffa502', '#ff7f50', '#e84393', '#fd79a8'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.beginPath();
                const sides = 6;
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const px = Math.cos(angle) * this.radius;
                    const py = Math.sin(angle) * this.radius;
                    if (i === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.restore();
            }
            
            isOutOfBounds() {
                return this.x < -50 || this.x > canvas.width + 50 ||
                       this.y < -50 || this.y > canvas.height + 50;
            }
        }
        
        // 绘制玩家
        function drawPlayer() {
            ctx.save();
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 20;
            
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                player.x - 5, player.y - 5, 0,
                player.x, player.y, player.radius
            );
            gradient.addColorStop(0, '#7dd3fc');
            gradient.addColorStop(1, player.color);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x - 8, player.y - 5, 6, 0, Math.PI * 2);
            ctx.arc(player.x + 8, player.y - 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(player.x - 6, player.y - 5, 3, 0, Math.PI * 2);
            ctx.arc(player.x + 10, player.y - 5, 3, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x, player.y + 5, 8, 0.2, Math.PI - 0.2);
            ctx.stroke();
            
            ctx.restore();
        }
        
        // 碰撞检测
        function checkCollision() {
            for (let obs of obstacles) {
                const dx = player.x - obs.x;
                const dy = player.y - obs.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < player.radius + obs.radius - 5) {
                    return true;
                }
            }
            return false;
        }
        
        // 生成障碍物
        function spawnObstacle() {
            if (Math.random() < 0.05) {
                obstacles.push(new Obstacle());
            }
        }
        
        // 重置游戏
        function resetGame() {
            gameRunning = true;
            startTime = Date.now();
            surviveTime = 0;
            difficulty = 1;
            lastDifficultyUp = 0;
            obstacles = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            document.getElementById('surviveTime').textContent = '0';
            document.getElementById('difficulty').textContent = '1';
        }
        
        // 更新游戏
        function update() {
            if (!gameRunning) return;
            
            // 更新键盘控制的玩家位置
            updatePlayerPosition();
            
            surviveTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('surviveTime').textContent = surviveTime;
            
            if (surviveTime > 0 && surviveTime % 10 === 0 && surviveTime !== lastDifficultyUp) {
                difficulty++;
                lastDifficultyUp = surviveTime;
                document.getElementById('difficulty').textContent = difficulty;
            }
            
            spawnObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (obstacles[i].isOutOfBounds()) {
                    obstacles.splice(i, 1);
                }
            }
            
            if (checkCollision()) {
                gameOver();
            }
        }
        
        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(74, 158, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            for (let obs of obstacles) {
                obs.draw();
            }
            
            drawPlayer();
        }
        
        // 游戏循环
        function gameLoop() {
            if (!gameRunning && !gameInitialized) return;
            
            update();
            draw();
            
            if (gameRunning || gameInitialized) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalTime').textContent = surviveTime;
            document.getElementById('finalDifficulty').textContent = difficulty;
            
            isNewRecord = checkNewRecord(surviveTime);
            document.getElementById('newRecordMsg').style.display = isNewRecord ? 'block' : 'none';
            
            const saveBtn = document.querySelector('.save-btn');
            saveBtn.disabled = false;
            saveBtn.textContent = '💾 保存';
            
            document.getElementById('gameOverOverlay').style.display = 'flex';
        }
        
        // 重新开始
        function restartGame() {
            resetGame();
            document.getElementById('gameOverOverlay').style.display = 'none';
            document.getElementById('playerName').value = '';
        }
        
        // 更新玩家位置（键盘控制）
        function updatePlayerPosition() {
            if (!gameRunning) return;
            
            let dx = 0;
            let dy = 0;
            
            // 检测方向键或WASD
            if (keys.ArrowUp || keys.w) dy -= 1;
            if (keys.ArrowDown || keys.s) dy += 1;
            if (keys.ArrowLeft || keys.a) dx -= 1;
            if (keys.ArrowRight || keys.d) dx += 1;
            
            // 如果有移动输入
            if (dx !== 0 || dy !== 0) {
                // 对角线移动时归一化速度
                if (dx !== 0 && dy !== 0) {
                    const length = Math.sqrt(dx * dx + dy * dy);
                    dx /= length;
                    dy /= length;
                }
                
                player.x += dx * player.speed;
                player.y += dy * player.speed;
                
                // 限制在画布内
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }
        }
        
        // 鼠标事件
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                player.x = e.clientX - rect.left;
                player.y = e.clientY - rect.top;
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                player.x = touch.clientX - rect.left;
                player.y = touch.clientY - rect.top;
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
        });
        
        // 键盘事件
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
            }
        });
        
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });
        
        // 回车键保存
        document.getElementById('playerName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                saveScore();
            }
        });
        
        // 初始化
        loadLeaderboard();
    </script>
</body>
</html>
