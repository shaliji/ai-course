<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避障碍物小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        
        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 18px;
        }
        
        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
        }
        
        #gameCanvas {
            border: 3px solid #4a9eff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
            cursor: grab;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 100%);
        }
        
        #gameCanvas:active {
            cursor: grabbing;
        }
        
        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .game-over-content {
            text-align: center;
            color: #fff;
            animation: popIn 0.3s ease-out;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .game-over-content h2 {
            font-size: 48px;
            color: #ff4757;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        
        .game-over-content p {
            font-size: 24px;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #4a9eff 0%, #6c5ce7 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }
        
        .instructions {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 躲避障碍物</h1>
        <div class="info-bar">
            <div class="info-item">⏱️ 存活时间: <span id="surviveTime">0</span> 秒</div>
            <div class="info-item">🎯 难度等级: <span id="difficulty">1</span></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <p class="instructions">💡 移动鼠标控制小人躲避障碍物，坚持越久越厉害！</p>
    </div>
    
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-content">
            <h2>💥 游戏结束!</h2>
            <p>你存活了 <span id="finalTime">0</span> 秒</p>
            <p>最高难度等级: <span id="finalDifficulty">1</span></p>
            <button class="restart-btn" onclick="restartGame()">🔄 再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏状态
        let gameRunning = true;
        let startTime = Date.now();
        let surviveTime = 0;
        let difficulty = 1;
        let lastDifficultyUp = 0;
        
        // 玩家
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 25,
            color: '#4a9eff',
            isDragging: false
        };
        
        // 障碍物数组
        let obstacles = [];
        
        // 鼠标位置
        let mouseX = player.x;
        let mouseY = player.y;
        
        // 障碍物类
        class Obstacle {
            constructor() {
                this.radius = 15 + Math.random() * 20;
                this.speed = 2 + Math.random() * 3 + difficulty * 0.5;
                
                // 从四个方向随机生成
                const side = Math.floor(Math.random() * 4);
                switch(side) {
                    case 0: // 上
                        this.x = Math.random() * canvas.width;
                        this.y = -this.radius;
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = this.speed;
                        break;
                    case 1: // 下
                        this.x = Math.random() * canvas.width;
                        this.y = canvas.height + this.radius;
                        this.vx = (Math.random() - 0.5) * 4;
                        this.vy = -this.speed;
                        break;
                    case 2: // 左
                        this.x = -this.radius;
                        this.y = Math.random() * canvas.height;
                        this.vx = this.speed;
                        this.vy = (Math.random() - 0.5) * 4;
                        break;
                    case 3: // 右
                        this.x = canvas.width + this.radius;
                        this.y = Math.random() * canvas.height;
                        this.vx = -this.speed;
                        this.vy = (Math.random() - 0.5) * 4;
                        break;
                }
                
                // 随机颜色
                const colors = ['#ff4757', '#ff6b81', '#ffa502', '#ff7f50', '#e84393', '#fd79a8'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // 旋转效果
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制障碍物（多边形）
                ctx.beginPath();
                const sides = 6;
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const px = Math.cos(angle) * this.radius;
                    const py = Math.sin(angle) * this.radius;
                    if (i === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                
                // 发光效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fillStyle = this.color;
                ctx.fill();
                
                ctx.restore();
            }
            
            isOutOfBounds() {
                return this.x < -50 || this.x > canvas.width + 50 ||
                       this.y < -50 || this.y > canvas.height + 50;
            }
        }
        
        // 绘制玩家
        function drawPlayer() {
            ctx.save();
            
            // 身体发光
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 20;
            
            // 身体
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(
                player.x - 5, player.y - 5, 0,
                player.x, player.y, player.radius
            );
            gradient.addColorStop(0, '#7dd3fc');
            gradient.addColorStop(1, player.color);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 眼睛
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(player.x - 8, player.y - 5, 6, 0, Math.PI * 2);
            ctx.arc(player.x + 8, player.y - 5, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // 瞳孔
            ctx.fillStyle = '#1a1a2e';
            ctx.beginPath();
            ctx.arc(player.x - 6, player.y - 5, 3, 0, Math.PI * 2);
            ctx.arc(player.x + 10, player.y - 5, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // 微笑
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(player.x, player.y + 5, 8, 0.2, Math.PI - 0.2);
            ctx.stroke();
            
            ctx.restore();
        }
        
        // 碰撞检测
        function checkCollision() {
            for (let obs of obstacles) {
                const dx = player.x - obs.x;
                const dy = player.y - obs.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < player.radius + obs.radius - 5) {
                    return true;
                }
            }
            return false;
        }
        
        // 生成障碍物
        function spawnObstacle() {
            const spawnRate = Math.max(500, 1500 - difficulty * 100);
            if (Math.random() < 0.05) {
                obstacles.push(new Obstacle());
            }
        }
        
        // 更新游戏
        function update() {
            if (!gameRunning) return;
            
            // 更新存活时间
            surviveTime = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('surviveTime').textContent = surviveTime;
            
            // 更新难度
            if (surviveTime > 0 && surviveTime % 10 === 0 && surviveTime !== lastDifficultyUp) {
                difficulty++;
                lastDifficultyUp = surviveTime;
                document.getElementById('difficulty').textContent = difficulty;
            }
            
            // 生成障碍物
            spawnObstacle();
            
            // 更新障碍物
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].update();
                if (obstacles[i].isOutOfBounds()) {
                    obstacles.splice(i, 1);
                }
            }
            
            // 碰撞检测
            if (checkCollision()) {
                gameOver();
            }
        }
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景网格
            ctx.strokeStyle = 'rgba(74, 158, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // 绘制障碍物
            for (let obs of obstacles) {
                obs.draw();
            }
            
            // 绘制玩家
            drawPlayer();
        }
        
        // 游戏循环
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // 游戏结束
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalTime').textContent = surviveTime;
            document.getElementById('finalDifficulty').textContent = difficulty;
            document.getElementById('gameOverOverlay').style.display = 'flex';
        }
        
        // 重新开始
        function restartGame() {
            gameRunning = true;
            startTime = Date.now();
            surviveTime = 0;
            difficulty = 1;
            lastDifficultyUp = 0;
            obstacles = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            document.getElementById('surviveTime').textContent = '0';
            document.getElementById('difficulty').textContent = '1';
            document.getElementById('gameOverOverlay').style.display = 'none';
            gameLoop();
        }
        
        // 鼠标事件 - 直接跟随鼠标移动
        canvas.addEventListener('mousemove', (e) => {
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                player.x = e.clientX - rect.left;
                player.y = e.clientY - rect.top;
                
                // 限制在画布内
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }
        });
        
        // 触摸事件支持 - 直接跟随触摸移动
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (gameRunning) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                player.x = touch.clientX - rect.left;
                player.y = touch.clientY - rect.top;
                
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
        });
        
        // 开始游戏
        gameLoop();
    </script>
</body>
</html>
